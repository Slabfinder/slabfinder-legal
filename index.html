<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlabFinder - Legal Documents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo h1 { font-size: 48px; color: #000; margin-bottom: 10px; }
        .logo span { color: #d7ff19; }
        .tagline { font-size: 16px; color: #666; margin-bottom: 50px; }
        .document-links { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        .doc-link {
            display: block; padding: 25px 30px; background: #000; color: white;
            text-decoration: none; border-radius: 12px; transition: all 0.3s ease;
            font-size: 18px; font-weight: 600; position: relative; overflow: hidden;
        }
        .doc-link::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: #d7ff19;
            transition: left 0.3s ease; z-index: 0;
        }
        .doc-link:hover::before { left: 0; }
        .doc-link span { position: relative; z-index: 1; transition: color 0.3s ease; }
        .doc-link:hover span { color: #000; }
        .footer { padding-top: 30px; border-top: 1px solid #e0e0e0; color: #888; font-size: 14px; }
        .footer strong { color: #000; display: block; margin-bottom: 5px; }
        .footer a { color: #000; text-decoration: none; font-weight: 600; }
        @media (max-width: 600px) {
            .container { padding: 40px 25px; }
            .logo h1 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Slab<span>Finder</span></h1>
            <p class="tagline">The World's Largest Stone Marketplace</p>
        </div>
        <div class="document-links">
            <a href="privacy-policy.html" class="doc-link"><span>🔒 Privacy Policy</span></a>
            <a href="terms-of-service.html" class="doc-link"><span>📋 Terms of Service</span></a>
        </div>
        <div class="footer">
            <strong>Poseidon Industries Inc.</strong>
            <p>4080 Duncan Rd, Punta Gorda, FL 33982, United States</p>
            <p style="margin-top: 10px;"><a href="mailto:Slabfinderapp@gmail.com">Slabfinderapp@gmail.com</a></p>
            <p style="margin-top: 20px; font-size: 12px;">© 2026 Poseidon Industries Inc. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
